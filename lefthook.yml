# See .cursor/rules/commit-phase-discipline.mdc
pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: pnpm biome check --staged --no-errors-on-unmatched
    migration-lint:
      glob: "packages/database/src/migrations/*.sql"
      run: pnpm exec tsx tools/dev/migration-lint.ts --staged
    typecheck:
      run: pnpm typecheck

pre-push:
  commands:
    debug-probes:
      run: node tools/ci/check-debug-probes.mjs
    test:
      run: pnpm --filter @meridian/database test
