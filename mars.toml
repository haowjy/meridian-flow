[dependencies.meridian-dev-workflow]
url = "https://github.com/haowjy/meridian-dev-workflow"

[settings]
targets = [
    ".claude",
    ".cursor",
    ".codex",
    ".opencode",
    ".pi",
]
models_cache_ttl_hours = 24

[settings.meridian.agent_copy]
harnesses = ["claude"]
include_fanout = false

[settings.meridian.fanout]
agents = [
    "reviewer",
    "browser-prober",
#    "prober",
]
