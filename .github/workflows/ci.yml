name: CI

on:
  # Any non-draft PR gets verified, regardless of base branch. `on:` can't
  # filter by draft state, so the draft gate lives on the jobs below.
  # `ready_for_review` is included so marking a draft ready triggers a run.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Push CI on the durable trunk verifies the post-merge result. Add a staging
  # branch here when one exists; don't encode temporary integration branches.
  push:
    branches: [main]
  workflow_call:

# Supersede in-flight runs for the same ref so rapid re-pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    # Skip draft PRs; pushes and workflow_call always run.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  migration-checks:
    name: migration-checks
    # Skip draft PRs; pushes and workflow_call always run.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      # `drizzle-kit check` validates the snapshot chain offline and never
      # connects, but the shared drizzle.config.ts requires DATABASE_URL to be
      # set. A placeholder satisfies that without provisioning a database.
      DATABASE_URL: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so --changed can diff against the PR base branch.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @meridian/database exec drizzle-kit check
      # PRs: lint only migrations this branch introduces. Warnings block merges
      # to main/staging (production-bound); feature-branch PRs block errors only.
      - name: Migration lint (pull request)
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE"
          STRICT_FLAG=""
          if [ "$BASE" = "main" ] || [ "$BASE" = "staging" ]; then
            STRICT_FLAG="--strict"
          fi
          pnpm exec tsx tools/dev/migration-lint.ts --changed "origin/$BASE" $STRICT_FLAG
      # Post-merge push: informational lint of all migrations (errors only).
      - name: Migration lint (push)
        if: github.event_name == 'push'
        run: pnpm exec tsx tools/dev/migration-lint.ts --all
