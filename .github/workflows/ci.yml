name: CI

on:
  # PRs into main or any h/** integration branch get verified on the way in.
  pull_request:
    branches: [main, "h/**"]
  # Push CI only on mainline branches; feature/integration branch work is
  # covered by its pull_request, so we avoid a duplicate run per push.
  push:
    branches: [main, "h/v3"]
  workflow_call:

# Supersede in-flight runs for the same ref so rapid re-pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  db-conformance:
    name: db-conformance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meridian_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d meridian_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meridian_test
      RUN_DB_TESTS: "1"
      TEST_DB_ALLOW_DESTRUCTIVE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm exec vitest run -c vitest.db.config.mts
