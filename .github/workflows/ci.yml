name: CI

on:
  # Any non-draft PR gets verified, regardless of base branch. `on:` can't
  # filter by draft state, so the draft gate lives on the jobs below.
  # `ready_for_review` is included so marking a draft ready triggers a run.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Push CI on the durable trunk verifies the post-merge result. Add a staging
  # branch here when one exists; don't encode temporary integration branches.
  push:
    branches: [main]
  workflow_call:

# Supersede in-flight runs for the same ref so rapid re-pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    # Skip draft PRs; pushes and workflow_call always run.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  db-conformance:
    name: db-conformance
    # Skip draft PRs; pushes and workflow_call always run.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meridian_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d meridian_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meridian_test
      RUN_DB_TESTS: "1"
      TEST_DB_ALLOW_DESTRUCTIVE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm exec vitest run -c vitest.db.config.mts
