<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote Workspace</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card bar">
        <h1 class="title">Remote Workspace</h1>
        <div class="crumbs" id="crumbs"></div>
        <div class="controls">
          <button id="refresh-btn" class="ghost" type="button">Refresh</button>
        </div>
        <div id="status" class="muted"></div>
      </section>

      <section class="card">
        <details id="clipboard-panel" class="clipboard-panel" open>
          <summary>Clipboard Images (.clipboard)</summary>
          <div class="clipboard-content">
            <div class="controls">
              <label class="upload-label">
                Choose Image
                <input id="upload-input" type="file" accept="image/*" hidden />
              </label>
              <button id="paste-clipboard-btn" class="ghost" type="button">Paste From Clipboard</button>
              <input
                id="upload-name-input"
                class="input"
                type="text"
                placeholder="filename.png (no spaces)"
              />
              <button id="upload-btn" class="action" type="button">Upload</button>
              <button id="clipboard-refresh-btn" class="ghost" type="button">Refresh Clipboard</button>
            </div>
            <div id="clipboard-status" class="muted"></div>
            <div id="clipboard-grid" class="clipboard-grid"></div>
          </div>
        </details>
      </section>

      <section class="card">
        <ul id="file-list"></ul>
      </section>

      <section class="card viewer">
        <h2 id="viewer-title">Preview</h2>
        <div id="viewer">
          <p class="placeholder">Select a file to preview it.</p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
